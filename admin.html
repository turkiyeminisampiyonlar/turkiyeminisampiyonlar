<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMŞ - Admin Kontrol Merkezi</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">🏆 TMŞ Yönetim Merkezi</div>
            <div class="nav-links">
                <a href="index.html" class="btn-admin-nav">🏠 Ana Sayfa</a>
            </div>
        </div>
    </nav>

    <div class="glass-container" style="max-width: 1100px;">
        <header>
            <img src="tmş.png" alt="TMŞ Logo" id="logo" style="max-width: 90px;">
            <h1>Yönetim Paneli</h1>
            <p class="subtitle">Turnuvaları Yönetin ve Başvuruları Onaylayın</p>
        </header>

        <div id="loginSection" class="text-center" style="padding: 30px 0;">
            <button id="googleLoginBtn" class="btn-primary">🌐 Google ile Admin Girişi</button>
            <p id="loginError" style="color: #ff0055; margin-top: 15px; font-weight: bold;"></p>
        </div>

        <div id="dashboardSection" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #252932; padding-bottom: 15px;">
                <h2 style="margin:0; border:none; color:#f39c12;">Yönetim Paneli Aktif</h2>
                <button id="logoutBtn" class="btn-secondary" style="background: #ff0055; border:none; color:#fff; padding: 6px 15px;">Çıkış Yap</button>
            </div>

            <div class="admin-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px;">
                
                <div class="admin-box" style="background: rgba(30,35,48,0.4); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                    <h3 style="color:#fff; margin-bottom:15px; border-bottom:1px solid #252932; padding-bottom:10px;">🛠️ Turnuva Oluştur / Güncelle</h3>
                    <form id="tournamentForm">
                        <div class="input-group">
                            <label>Turnuva Seç (Düzenlemek İçin)</label>
                            <select id="adminTournamentSelect" class="form-select">
                                <option value="new">++ Yeni Turnuva Ekle ++</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Turnuva Adı</label>
                            <input type="text" id="tTitle" required placeholder="Örn: Mini Şampiyonlar Sezon 3">
                        </div>
                        <div class="input-group">
                            <label>Tarih Aralığı</label>
                            <input type="text" id="tDate" required placeholder="Örn: 31 Ekim - 1 Kasım 2026">
                        </div>
                        <div class="input-group">
                            <label>Ödül Detayları</label>
                            <input type="text" id="tReward" required placeholder="Örn: Kişi Başı 200 TL Hediye Kodu">
                        </div>
                        <div class="input-group">
                            <label>Maksimum Takım (Kota)</label>
                            <input type="number" id="tMaxTeams" required placeholder="Örn: 16">
                        </div>
                        <div class="input-group">
                            <label>Takım Formatı (Kilitli)</label>
                            <input type="number" id="tTeamSize" value="3" disabled style="opacity: 0.5; background: #0a0b0d;">
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Diske Yaz / Kaydet</button>
                    </form>
                </div>

                <div class="admin-box" style="background: rgba(30,35,48,0.4); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                    <h3 style="color:#fff; margin-bottom:15px; border-bottom:1px solid #252932; padding-bottom:10px;">📥 Bekleyen Başvurular</h3>
                    <div id="applicationsList"></div>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
