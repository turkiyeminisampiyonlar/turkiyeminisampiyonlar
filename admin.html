<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMŞ - Admin Kontrol Merkezi</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <nav class="top-navbar">
        <div class="nav-logo">
            <img src="tmş.png" alt="TMŞ Logo" class="nav-logo-img">
            <span>TMŞ <span class="accent-text">ADMIN</span></span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Ana Sayfa</a></li>
            <li><button id="logoutBtn" class="nav-admin-btn" style="display: none; background: rgba(255, 95, 86, 0.1); color: #ff5f56 !important; border-color: rgba(255, 95, 86, 0.2);">Güvenli Çıkış</button></li>
        </ul>
    </nav>

    <div class="glass-window" style="max-width: 900px;">
        <div class="window-titlebar">
            <div class="window-dots">
                <span class="dot dot-close"></span>
                <span class="dot dot-minimize"></span>
                <span class="dot dot-maximize"></span>
            </div>
            <div class="window-title">tms_admin_core.exe</div>
            <div class="window-status"><span class="status-indicator" id="authStatusIndicator" style="background:#ff5f56; box-shadow: 0 0 6px #ff5f56;"></span> <span id="authStatusText">Kilitli</span></div>
        </div>

        <div class="window-content">
            <header>
                <div class="logo-area">
                    <img src="tmş.png" alt="TMŞ Logo" id="logo" style="max-width: 100px;">
                </div>
                <h1>Yönetim Paneli</h1>
                <p class="subtitle">Turnuva Başvurularını Güvenli Yönetme Merkezi</p>
            </header>

            <div id="loginSection" class="text-center" style="padding: 30px 0;">
                <p style="color: #8e95a5; margin-bottom: 20px; font-size: 14px;">Bu alana erişim sadece yetkili turnuva baş organizatörüne aittir.</p>
                <button id="googleLoginBtn" class="btn-primary" style="background: linear-gradient(90deg, #4285F4, #34A853);">🌐 Google ile Admin Girişi</button>
                <p id="loginError" style="color: #ff5f56; margin-top: 15px; font-weight: bold; font-size: 14px; display: none; background: rgba(255,95,86,0.1); padding: 10px; border-radius: 6px;"></p>
            </div>

            <div id="dashboardSection" style="display: none;">
                <div style="margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;">
                    <h2 style="font-size: 20px; color: #f39c12; border-left: 4px solid #f39c12; padding-left: 10px;">Gelen Takım Başvuruları</h2>
                </div>
                
                <div id="applicationsList">
                    <p style="color: #6f7685; text-align: center; padding: 20px;">Veriler şifreli kanaldan çekiliyor...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
