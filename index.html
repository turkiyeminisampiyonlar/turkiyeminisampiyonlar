<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>TMŞ - Türkiye Mini Şampiyonlar</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

  <div id="tms-loader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0b0d;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s;">
    <div style="width:40px;height:40px;border:3px solid rgba(243,156,18,0.1);border-top:3px solid #f39c12;border-radius:50%;animation:spin 0.6s linear infinite;"></div>
    <div style="color:#f39c12;margin-top:15px;font-weight:800;font-size:12px;letter-spacing:1px;">GÜVENLİ VERİ BAĞLANTISI SAĞLANIYOR...</div>
  </div>

  <div class="glass-container">
    <header>
      <div class="logo-area">
        <img src="tmş.png" alt="TMŞ Logo" id="logo">
      </div>
      <h1>Türkiye Mini Şampiyonlar</h1>
      <p class="subtitle">Henüz keşfedilmemiş yeteneklerin düello meydanı!</p>
      <div class="hero-actions" id="hubActionsArea">
        </div>
    </header>

    <div id="tournamentHubView">
      <div style="display:flex;gap:10px;margin-bottom:20px;background:rgba(0,0,0,0.1);padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.02);">
        <input type="text" id="searchInput" placeholder="Turnuva ara..." style="margin-bottom:0;">
      </div>
      <div id="tournamentGrid" class="tournament-grid"></div>
    </div>

    <div id="registrationFormView" style="display:none;">
      <div style="margin-bottom:25px;text-align:left;">
        <button id="backToHubBtn" class="btn-secondary" style="padding:8px 18px;font-size:13px;">◀ Turnuvalara Geri Dön</button>
      </div>

      <div id="selectedTournamentCard" style="background:rgba(243,156,18,0.03);border:1px solid rgba(243,156,18,0.15);padding:20px;border-radius:12px;margin-bottom:30px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;text-align:left;"></div>

      <section class="form-section">
        <h2>Espor Kayıt Formu</h2>
        <div id="registrationForm">
          <div class="input-grid">
            <div class="input-group">
              <label>Takım / Oyuncu İsmi</label>
              <input type="text" id="teamName" placeholder="Savaş alanındaki adınız">
            </div>
            <div class="input-group">
              <label>Profil / Takım Logosu (Kare 1x1)</label>
              <input type="file" id="teamLogo" accept="image/*">
            </div>
          </div>
          <p style="color:#6f7685;font-size:11px;margin-top:-10px;margin-bottom:20px;text-align:left;">
            Yüklenen takım logosunun tam kare (1x1) boyutta olması kod tarafından denetlenecektir.
          </p>
          <div id="dynamicPlayersContainer"></div>
          <button id="submitBtn" class="btn-submit">Savaşa Katıl</button>
        </div>
      </section>
    </div>
  </div>

  <div id="statusModal" class="modal">
    <div class="modal-content text-center">
      <div id="statusIcon"></div>
      <h2 id="statusTitle">İşlem Durumu</h2>
      <p id="statusMessage"></p>
      <button id="closeStatusBtn" class="btn-secondary" style="margin-top:15px;width:auto;padding:10px 30px;">Kapat</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
