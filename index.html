<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMŞ - Türkiye Mini Şampiyonlar</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">🏆 TMŞ Espor</div>
            <div class="nav-links">
                <a href="admin.html" class="btn-admin-nav">👑 Admin Paneli</a>
            </div>
        </div>
    </nav>

    <div class="glass-container">
        <header>
            <div class="logo-area">
                <img src="tmş.png" alt="TMŞ Logo" id="logo">
            </div>
            <h1>Türkiye Mini Şampiyonlar</h1>
            <p class="subtitle">Henüz keşfedilmemiş yeteneklerin düello meydanı!</p>
        </header>

        <section class="info-section">
            <div class="input-group">
                <label for="tournamentSelect" class="section-label">🎮 Aktif Turnuva Seçin</label>
                <select id="tournamentSelect" class="form-select"></select>
            </div>
            
            <div id="tournamentDetails" class="details-box" style="display: none;">
                <h3 id="viewTitle" class="tournament-title">Turnuva Yükleniyor...</h3>
                <div class="details-grid">
                    <div class="detail-item">📅 <b>Tarih:</b> <span id="viewDate">-</span></div>
                    <div class="detail-item">🎁 <b>Ödül:</b> <span id="viewReward">-</span></div>
                    <div class="detail-item">👥 <b>Takım Formatı:</b> <span id="viewSize">-</span> Kişilik</div>
                </div>
                
                <div class="quota-wrapper">
                    <div class="quota-bar-container">
                        <div id="quotaFill" class="quota-bar-fill"></div>
                    </div>
                    <p id="quotaText" class="quota-text">Slot Durumu: Yükleniyor...</p>
                </div>
            </div>
        </section>

        <section id="register-section" class="form-section">
            <h2>Kayıt Formu</h2>
            <form id="registrationForm">
                <div class="input-group">
                    <label>Takım İsmi</label>
                    <input type="text" id="teamName" placeholder="Örn: NVO (Oyuncu adı olamaz)" required>
                </div>

                <div class="input-group">
                    <label>Takım Logosu</label>
                    <input type="file" id="teamLogo" accept="image/*" required>
                </div>

                <div id="dynamicPlayersGrid" class="squad-grid"></div>

                <button type="submit" id="submitBtn" class="btn-submit">Savaşa Katıl</button>
            </form>
        </section>
    </div>

    <div id="statusModal" class="modal">
        <div class="modal-content text-center">
            <div id="statusIcon"></div>
            <h2 id="statusTitle">İşlem Durumu</h2>
            <p id="statusMessage"></p>
            <button id="closeStatusBtn" class="btn-secondary" style="margin-top:20px; padding:10px 30px;">Kapat</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
