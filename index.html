<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>TMŞ - Türkiye Mini Şampiyonlar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOADER -->
  <div id="tms-loader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0b0d;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s;">
    <div style="width:40px;height:40px;border:3px solid rgba(243,156,18,0.1);border-top:3px solid #f39c12;border-radius:50%;animation:spin 0.6s linear infinite;"></div>
    <div style="color:#f39c12;margin-top:15px;font-weight:800;font-size:11px;letter-spacing:2px;">BAĞLANTI SAĞLANIYOR</div>
  </div>

  <!-- ÜST NAVİGASYON -->
  <nav class="top-navbar">
    <div class="nav-brand">
      <img src="tmş.png" alt="TMŞ" onerror="this.style.display='none'">
      <span>TMŞ</span>
    </div>
    <div class="nav-links">
      <button class="nav-btn active" id="navHomeBtn">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Ana Sayfa</span>
      </button>
      <button class="nav-btn" id="navMyAppsBtn">
        <span class="nav-icon">🎮</span>
        <span class="nav-label">Katıldıklarım</span>
      </button>
      <a href="admin.html" class="nav-btn nav-admin">
        <span class="nav-icon">👑</span>
        <span class="nav-label">Yönetici</span>
      </a>
    </div>
  </nav>

  <!-- ANA İÇERİK -->
  <div class="page-wrapper">

    <!-- HERO BAŞLIK -->
    <div class="hero-section" id="heroSection">
      <img src="tmş.png" alt="TMŞ Logo" id="logo" onerror="this.style.display='none'">
      <h1>Türkiye Mini Şampiyonlar</h1>
      <p class="subtitle">Henüz keşfedilmemiş yeteneklerin düello meydanı</p>
    </div>

    <!-- TURNUVA HUB -->
    <div id="tournamentHubView">
      <div class="search-bar-wrap">
        <span style="font-size:16px;">🔍</span>
        <input type="text" id="searchInput" placeholder="Turnuva ara...">
      </div>
      <div id="tournamentGrid" class="tournament-grid"></div>
    </div>

    <!-- KATILDIĞLARIMEKRANİ -->
    <div id="myApplicationsView" style="display:none;">
      <div class="section-title">🎮 Katıldığım Turnuvalar</div>
      <div class="search-bar-wrap" style="margin-bottom:20px;">
        <span style="font-size:16px;">📧</span>
        <input type="email" id="myEmailInput" placeholder="Kaptan e-posta adresiniz">
        <button id="searchMyAppsBtn" class="btn-primary" style="padding:10px 18px;white-space:nowrap;font-size:13px;">Sorgula</button>
      </div>
      <div id="myApplicationsList"></div>
    </div>

    <!-- KAYIT FORMU -->
    <div id="registrationFormView" style="display:none;">
      <button id="backToHubBtn" class="btn-back">◀ Turnuvalara Dön</button>
      <div id="selectedTournamentCard" class="selected-tournament-banner"></div>
      <div class="form-section">
        <h2>⚔️ Espor Kayıt Formu</h2>
        <div class="input-grid">
          <div class="input-group">
            <label>Takım / Oyuncu İsmi</label>
            <input type="text" id="teamName" placeholder="Savaş alanındaki adınız">
          </div>
          <div class="input-group">
            <label>Takım Logosu (Kare 1x1)</label>
            <input type="file" id="teamLogo" accept="image/*">
          </div>
        </div>
        <p class="hint-text">⚠️ Logo tam kare (1x1) boyutta olmalıdır, sistem denetler.</p>
        <div id="dynamicPlayersContainer"></div>
        <button id="submitBtn" class="btn-submit">⚔️ Savaşa Katıl ve Kaydı Tamamla</button>
      </div>
    </div>
  </div>

  <!-- DURUM MODALİ -->
  <div id="statusModal" class="modal">
    <div class="modal-content text-center">
      <div id="statusIcon"></div>
      <h2 id="statusTitle"></h2>
      <p id="statusMessage"></p>
      <button id="closeStatusBtn" class="btn-secondary" style="margin-top:20px;padding:10px 35px;">Kapat</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
