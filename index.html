<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMŞ - Türkiye Mini Şampiyonlar</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">🏆 TMŞ</div>
            <div class="nav-links">
                <a href="admin.html" class="btn-admin-nav">👑 Admin Paneli</a>
            </div>
        </div>
    </nav>

    <div class="glass-container">
        <header>
            <div class="logo-area">
                <img src="tmş.png" alt="TMŞ Logo" id="logo">
            </div>
            <h1>Türkiye Mini Şampiyonlar</h1>
            <p class="subtitle">Henüz keşfedilmemiş yeteneklerin düello meydanı!</p>
            
            <div class="hero-actions">
                <a href="#register-section" class="btn-primary">⚔️ Hemen Başvur</a>
            </div>
        </header>

        <section id="register-section" class="form-section">
            <h2>Kayıt Formu</h2>
            <form id="registrationForm">
                <div class="input-group">
                    <label>Takım İsmi</label>
                    <input type="text" id="teamName" placeholder="Örn: NVO (Oyuncu adı olamaz)" required>
                </div>

                <div class="input-group">
                    <label>Takım Logosu</label>
                    <input type="file" id="teamLogo" accept="image/*" required>
                </div>

                <div class="squad-grid">
                    <div class="player-card">
                        <h3>Oyuncu 1 (Kaptan)</h3>
                        <input type="text" id="p1Name" placeholder="Oyun İçi Adı (IGN)" required>
                        <input type="email" id="p1Email" placeholder="E-Posta Adresi" required>
                        <input type="text" id="p1YT" placeholder="YouTube / Sosyal Medya" required>
                    </div>

                    <div class="player-card">
                        <h3>Oyuncu 2</h3>
                        <input type="text" id="p2Name" placeholder="Oyun İçi Adı (IGN)" required>
                        <input type="email" id="p2Email" placeholder="E-Posta Adresi" required>
                        <input type="text" id="p2YT" placeholder="YouTube / Sosyal Medya" required>
                    </div>

                    <div class="player-card">
                        <h3>Oyuncu 3</h3>
                        <input type="text" id="p3Name" placeholder="Oyun İçi Adı (IGN)" required>
                        <input type="email" id="p3Email" placeholder="E-Posta Adresi" required>
                        <input type="text" id="p3YT" placeholder="YouTube / Sosyal Medya" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">Savaşa Katıl</button>
            </form>
        </section>
    </div>

    <div id="statusModal" class="modal">
        <div class="modal-content text-center">
            <div id="statusIcon"></div>
            <h2 id="statusTitle">İşlem Durumu</h2>
            <p id="statusMessage"></p>
            <button id="closeStatusBtn" class="btn-secondary" style="margin-top:15px; width:auto; padding:10px 30px;">Kapat</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
